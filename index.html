<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https: //fonts.googleapis.com/css2? family = Montserrat: wght @ 400; 500; 700; 800 & display = swap " rel=" stylesheet " />
    <link rel="stylesheet" href="style.css" />
    <title>Адаптивний Сайт</title>
</head>

<body>
    <div class="wrapper">
        <header class="header">
            <div class="header__container _container">
                <a href="#" class="header__logo"> Relvise </a>
                <nav class="header__menu menu">
                    <ul class="menu__list">
                        <li class="menu__item">
                            <a href="#" class="menu__link">Home</a>
                        </li>
                        <li class="menu__item">
                            <a href="#" class="menu__link">Product</a>
                        </li>
                        <li class="menu__item">
                            <a href="#" class="menu__link">Pricing</a>
                        </li>
                        <li class="menu__item">
                            <a href="#" class="menu__link">Contact</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>
        <!-- Main=============================================================== -->
        <main class="page">
            <div class="page__mainBlock mainBlock">
                <div class="mainBlock__container _container">
                    <div class="mainBlock__body">
                        <div class="mainBlock__title">
                            Finance and Consultancy Solution
                        </div>
                        <div class="mainBlock__text">
                            We know how large objects will act, but things on a small scale.
                        </div>
                        <div class="mainBlock__buttons">
                            <a href="#" class="mainBlock__button"> Get Quote Now </a>
                            <a href="#" class="mainBlock__button mainBlock__button_border"> Learn More </a>
                        </div>
                    </div>
                </div>
                <div class="mainBlock__img _ibg">
                    <img src="./img/header.jpg" alt="Baner">
                </div>
            </div>
            <div class="page__services services">
                <div class="services__container _container">
                    <div class="services__body">
                        <div class="services__column">
                            <div class="services__item itemService">
                                <div class="itemService__icon">
                                    <img src="./img/icon/01.svg" alt="Environmental 
                    Consulting">
                                </div>
                                <h3 class="itemService__title"> </h3>
                                <div class="itemService__text"> </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer =============================================================== -->
        <footer class="footer">footer</footer>
    </div>
</body>

</html>
